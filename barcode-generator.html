<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="免费在线生成 CODE128、EAN、UPC 等常用格式的条形码。">
  <title>在线条形码生成器</title>
  <style>
    :root {
      --primary: #2196f3;
      --primary-dark: #0b7dda;
      --ink: #172033;
      --muted: #667085;
      --line: #dce2eb;
      --surface: #fff;
      --background: #f2f4f8;
      --danger: #d92d20;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--background);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    button, input, select { font: inherit; }
    button, select, input[type="range"], input[type="color"], input[type="checkbox"] { cursor: pointer; }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .back-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .back-link:hover { color: var(--primary-dark); }

    .hero {
      max-width: 720px;
      margin: 0 auto 34px;
      text-align: center;
    }

    .hero-badge {
      display: inline-block;
      padding: 7px 12px;
      color: #0874c9;
      background: #e8f4ff;
      border: 1px solid #c8e4ff;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(34px, 5vw, 50px);
      letter-spacing: -0.04em;
    }

    .hero p { margin: 0; color: var(--muted); font-size: 17px; }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(28, 48, 82, 0.1);
      overflow: hidden;
    }

    .panel { padding: 36px 40px 40px; }
    .preview-panel { background: #fbfcfe; border-left: 1px solid var(--line); }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 28px;
    }

    .step {
      width: 40px;
      height: 40px;
      display: grid;
      flex: 0 0 auto;
      place-items: center;
      color: var(--primary);
      background: #eaf4ff;
      border-radius: 11px;
      font-size: 13px;
      font-weight: 800;
    }

    .section-heading h2 { margin: 0 0 3px; font-size: 20px; }
    .section-heading p { margin: 0; color: var(--muted); font-size: 13px; }

    .field { display: block; margin-bottom: 22px; }
    .label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; font-size: 14px; }
    .label-row small, .label-row output { color: var(--muted); font-size: 12px; }

    input[type="text"], select {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      color: var(--ink);
      background: #fff;
      border: 1px solid #cfd7e5;
      border-radius: 8px;
      outline: none;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.12);
    }

    .input-wrap { display: flex; gap: 8px; }
    .input-wrap input { min-width: 0; }

    .clear-button {
      padding: 0 15px;
      color: #475467;
      background: #fff;
      border: 1px solid #cfd7e5;
      border-radius: 8px;
      white-space: nowrap;
    }

    .field-hint, .field-error {
      display: block;
      min-height: 17px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .field-error { color: var(--danger); }
    .two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    input[type="range"] { width: 100%; accent-color: var(--primary); }

    .color-field {
      height: 46px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 10px 5px 6px;
      color: #475467;
      background: #fff;
      border: 1px solid #cfd7e5;
      border-radius: 8px;
      font-family: Consolas, monospace;
      font-size: 13px;
    }

    input[type="color"] { width: 34px; height: 32px; padding: 0; border: 0; background: transparent; }

    .toggle-row { display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .toggle-row input { width: 18px; height: 18px; accent-color: var(--primary); }

    .preview-stage {
      min-height: 315px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 22px;
      background-color: #eef2f7;
      background-image: linear-gradient(45deg, #e3e8ef 25%, transparent 25%), linear-gradient(-45deg, #e3e8ef 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e3e8ef 75%), linear-gradient(-45deg, transparent 75%, #e3e8ef 75%);
      background-size: 18px 18px;
      background-position: 0 0, 0 9px, 9px -9px, -9px 0;
      border: 1px solid #d8dfe9;
      border-radius: 12px;
    }

    .live-badge {
      align-self: flex-start;
      margin-bottom: 15px;
      padding: 6px 9px;
      color: #526174;
      background: rgba(255,255,255,.92);
      border: 1px solid #d7dee8;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
    }

    .live-badge::before {
      content: "";
      width: 7px;
      height: 7px;
      display: inline-block;
      margin-right: 6px;
      background: #20b26b;
      border-radius: 50%;
    }

    .barcode-card {
      min-height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: auto;
      background: #fff;
      border-radius: 7px;
      box-shadow: 0 6px 20px rgba(27, 46, 78, 0.1);
    }

    #barcode-output { max-width: 100%; height: auto; }
    .error-state { color: var(--danger); text-align: center; }
    .error-state small { display: block; margin-top: 6px; color: var(--muted); }
    .privacy { margin: 14px 0 0; color: var(--muted); text-align: center; font-size: 11px; }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }

    .button {
      min-height: 46px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: 8px;
      font-weight: 700;
    }

    .button-primary { color: #fff; background: var(--primary); }
    .button-primary:hover { background: var(--primary-dark); }
    .button-secondary { color: var(--primary); background: #fff; border-color: #add4f7; }
    .button-secondary:hover { background: #eef7ff; }
    .button-wide { width: 100%; margin-top: 10px; color: #475467; background: transparent; border-color: #cfd7e5; }
    .button:disabled { opacity: .45; cursor: not-allowed; }

    .toast { min-height: 18px; margin-top: 8px; color: #16804f; text-align: center; font-size: 12px; opacity: 0; transition: opacity .2s; }
    .toast.show { opacity: 1; }

    @media (max-width: 820px) {
      .page { padding-top: 24px; }
      .workspace { grid-template-columns: 1fr; }
      .preview-panel { border-top: 1px solid var(--line); border-left: 0; }
    }

    @media (max-width: 520px) {
      .page { width: min(100% - 20px, 1120px); }
      .panel { padding: 26px 20px 30px; }
      .hero { margin-bottom: 25px; }
      .hero p { font-size: 15px; }
      .two-column, .actions { grid-template-columns: 1fr; gap: 0; }
      .actions .button + .button { margin-top: 10px; }
      .barcode-card { padding: 15px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="top-nav" aria-label="页面导航">
      <a class="back-link" href="tutorial.html">← 返回教程</a>
      <a class="back-link" href="index.html">返回主页</a>
    </nav>

    <header class="hero">
      <span class="hero-badge">免费 · 快速 · 无需注册</span>
      <h1>在线条形码生成器</h1>
      <p>输入内容，即刻生成清晰、可下载的专业条形码。</p>
    </header>

    <div class="workspace">
      <section class="panel" aria-labelledby="settings-title">
        <div class="section-heading">
          <span class="step">01</span>
          <div>
            <h2 id="settings-title">设置条形码</h2>
            <p>选择格式并调整显示参数</p>
          </div>
        </div>

        <form id="barcode-form" novalidate>
          <label class="field">
            <span class="label-row"><b>条形码内容</b><small id="char-count">12 / 80</small></span>
            <span class="input-wrap">
              <input id="barcode-value" type="text" value="690123456789" maxlength="80" autocomplete="off" spellcheck="false">
              <button class="clear-button" id="clear-value" type="button">清空</button>
            </span>
            <span class="field-error" id="value-error" role="alert"></span>
          </label>

          <label class="field">
            <span class="label-row"><b>条码格式</b></span>
            <select id="barcode-format">
              <option value="CODE128">CODE 128（通用推荐）</option>
              <option value="CODE39">CODE 39</option>
              <option value="EAN13">EAN-13（商品码）</option>
              <option value="EAN8">EAN-8</option>
              <option value="UPC">UPC-A</option>
              <option value="ITF14">ITF-14（物流箱码）</option>
              <option value="MSI">MSI</option>
              <option value="pharmacode">Pharmacode</option>
              <option value="codabar">Codabar</option>
            </select>
            <span class="field-hint" id="format-hint">支持数字、英文及常用符号，适合大多数场景。</span>
          </label>

          <div class="two-column">
            <label class="field">
              <span class="label-row"><b>条码宽度</b><output id="width-output">2 px</output></span>
              <input id="barcode-width" type="range" min="1" max="4" step="0.5" value="2">
            </label>
            <label class="field">
              <span class="label-row"><b>条码高度</b><output id="height-output">100 px</output></span>
              <input id="barcode-height" type="range" min="50" max="180" step="10" value="100">
            </label>
          </div>

          <div class="two-column">
            <label class="field">
              <span class="label-row"><b>条码颜色</b></span>
              <span class="color-field"><input id="line-color" type="color" value="#111827"><span id="line-color-value">#111827</span></span>
            </label>
            <label class="field">
              <span class="label-row"><b>背景颜色</b></span>
              <span class="color-field"><input id="background-color" type="color" value="#ffffff"><span id="background-color-value">#FFFFFF</span></span>
            </label>
          </div>

          <label class="toggle-row">
            <input id="display-value" type="checkbox" checked>
            <span><b>显示条码文字</b><br><small class="field-hint">在条形码下方显示原始内容</small></span>
          </label>
        </form>
      </section>

      <section class="panel preview-panel" aria-labelledby="preview-title">
        <div class="section-heading">
          <span class="step">02</span>
          <div>
            <h2 id="preview-title">预览与下载</h2>
            <p>实时生成，可导出高清文件</p>
          </div>
        </div>

        <div class="preview-stage">
          <span class="live-badge">实时预览</span>
          <div class="barcode-card">
            <svg id="barcode-output"></svg>
            <div class="error-state" id="error-state" hidden>
              <strong>暂时无法生成</strong>
              <small>请检查输入内容是否符合所选格式</small>
            </div>
          </div>
          <p class="privacy">内容仅在你的浏览器中处理，不会上传服务器</p>
        </div>

        <div class="actions">
          <button class="button button-primary" id="download-png" type="button">下载 PNG</button>
          <button class="button button-secondary" id="download-svg" type="button">下载 SVG</button>
        </div>
        <button class="button button-wide" id="copy-image" type="button">复制条形码图片</button>
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="barcode-generator.js"></script>
</body>
</html>
